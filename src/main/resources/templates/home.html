<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ | Food Order</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="shell">
    <header class="bar">
        <a class="brand" th:href="@{/home}">Food<span>Order</span></a>
        <nav class="nav-actions">
            <span class="user-tag" sec:authentication="name">user</span>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-ghost">Đăng xuất</button>
            </form>
        </nav>
    </header>
    <div class="panel">
        <h2>Xin chào</h2>
        <p>Bạn đã đăng nhập. Đây là khu vực làm việc cơ bản; có thể mở rộng thêm menu, giỏ hàng và đơn hàng sau.</p>
    </div>
</div>
</body>
</html>
