<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Quản lý Món Ăn</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Sidebar CSS */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #ffffff;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 20px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.03);
        }
        
        .sidebar-brand {
            color: #5b21b6;
            font-weight: 800;
            font-size: 24px;
            padding-left: 20px;
            margin-bottom: 30px;
        }

        .nav-item .nav-link {
            color: #6b7280;
            font-weight: 500;
            padding: 12px 20px;
            margin: 4px 15px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-item .nav-link i {
            width: 25px;
            font-size: 18px;
        }

        .nav-item .nav-link:hover, .nav-item .nav-link.active {
            background-color: #f5f3ff;
            color: #6d28d9;
        }

        /* Main Content CSS */
        .main-content {
            margin-left: 260px;
            padding: 30px 40px;
        }

        .table-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .table > thead {
            color: #6b7280;
            font-weight: 600;
            font-size: 14px;
        }

        .table > tbody > tr > td {
            vertical-align: middle;
            font-size: 15px;
            color: #374151;
        }

        .dish-thumbnail {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        .btn-purple {
            background-color: #6d28d9;
            color: white;
            font-weight: 500;
            border-radius: 8px;
        }
        .btn-purple:hover {
            background-color: #5b21b6;
            color: white;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-infinity"></i> FoodOrder
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a href="#" class="nav-link"><i class="fa-solid fa-border-all"></i> Dashboard</a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/dishes}" class="nav-link active"><i class="fa-solid fa-burger"></i> Món ăn</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link"><i class="fa-solid fa-ticket"></i> Khuyến mãi</a>
            </li>
            <li class="nav-item mt-5">
                <a href="#" class="nav-link text-danger"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 style="font-weight: 700; color: #111827;">Danh sách Món ăn</h2>
            
            <div>
                <a href="/admin/undo" class="btn btn-outline-secondary me-2">
                    <i class="fa-solid fa-rotate-left"></i> Undo
                </a>
                
                <a href="/admin/redo" class="btn btn-outline-secondary me-3">
                    <i class="fa-solid fa-rotate-right"></i> Redo
                </a>

                <button class="btn btn-purple px-4 py-2" data-bs-toggle="modal" data-bs-target="#addDishModal">
                    <i class="fa-solid fa-plus me-2"></i> Thêm Món
                </button>
            </div>
        </div>

        <div class="table-card">
            <table class="table table-hover border-bottom">
                <thead>
                    <tr>
                        <th width="30%">Tên món</th>
                        <th width="20%">Giá bán</th>
                        <th width="35%">Mô tả</th>
                        <th width="15%" class="text-center">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="dish : ${dishes}">
                        <td>
                            <div class="d-flex align-items-center">
                                <img th:src="${dish.imageUrl}" alt="Img" class="dish-thumbnail me-3">
                                <span th:text="${dish.name}" style="font-weight: 600;"></span>
                            </div>
                        </td>
                        <td th:text="${#numbers.formatDecimal(dish.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        <td>
                            <div class="text-muted" 
                                 style="max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"
                                 th:text="${dish.description}">
                            </div>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-light text-primary me-1" 
                                    data-bs-toggle="modal" 
                                    th:data-bs-target="'#editDishModal-' + ${dish.dishId}" title="Sửa">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                            
                            <a th:href="@{/admin/delete/{id}(id=${dish.dishId})}" class="btn btn-sm btn-light text-danger" title="Xóa">
                                <i class="fa-solid fa-trash-can"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="addDishModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form action="/admin/add" method="POST">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold text-purple">Thêm Món Mới</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tên món</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Giá tiền (VNĐ)</label>
                            <input type="number" name="price" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Link Hình Ảnh</label>
                            <input type="text" name="imageUrl" class="form-control" value="https://via.placeholder.com/150">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mô tả</label>
                            <textarea name="description" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-purple">Lưu Món Mới</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <th:block th:each="dish : ${dishes}">
        <div class="modal fade" th:id="'editDishModal-' + ${dish.dishId}" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/admin/update/{id}(id=${dish.dishId})}" method="POST">
                        <div class="modal-header">
                            <h5 class="modal-title fw-bold text-primary">Cập Nhật Món Ăn</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Tên món</label>
                                <input type="text" name="name" class="form-control" th:value="${dish.name}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Giá tiền (VNĐ)</label>
                                <input type="number" name="price" class="form-control" th:value="${#numbers.formatDecimal(dish.price, 0, 0)}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Link Hình Ảnh</label>
                                <input type="text" name="imageUrl" class="form-control" th:value="${dish.imageUrl}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mô tả</label>
                                <textarea name="description" class="form-control" rows="3" th:text="${dish.description}"></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-primary">Lưu Thay Đổi</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </th:block>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
